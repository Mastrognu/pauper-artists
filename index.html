<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pauper Artist Lookup</title>
<style>
:root {
  --bg:#12121f;--surface:#1c1c30;--card-bg:#252540;
  --accent:#e05555;--gold:#c8a84b;
  --text:#e8e8f0;--dim:#7878a0;--border:#2e2e50;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
header{text-align:center;padding:28px 20px 16px}
header h1{font-size:1.8rem;color:var(--gold);letter-spacing:.06em;margin-bottom:4px}
header p{color:var(--dim);font-size:.82rem}

/* sticky top nav */
.top-nav{
  position:sticky;top:0;z-index:50;
  display:flex;justify-content:center;align-items:center;gap:8px;
  padding:10px 20px 10px;background:var(--bg);
  border-bottom:1px solid var(--border);margin-bottom:24px;
}
.top-nav button{
  padding:6px 26px;border-radius:999px;border:1px solid var(--border);
  background:transparent;color:var(--dim);cursor:pointer;font-size:.88rem;transition:all .15s
}
.top-nav button.on{background:var(--accent);border-color:var(--accent);color:#fff}
.top-nav a.admin-lnk{
  position:absolute;right:16px;font-size:.72rem;
  color:var(--dim);text-decoration:none;padding:4px
}
.top-nav a.admin-lnk:hover{color:var(--text)}

.section{display:none}.section.on{display:block}

/* ── Search ── */
.search-box{max-width:560px;margin:0 auto 28px;padding:0 16px}
.mode-tabs{display:flex;justify-content:center;gap:8px;margin-bottom:12px}
.mode-tabs button{
  padding:5px 20px;border-radius:999px;border:1px solid var(--border);
  background:transparent;color:var(--dim);cursor:pointer;font-size:.85rem;transition:all .15s
}
.mode-tabs button.on{background:var(--accent);border-color:var(--accent);color:#fff}
.wrap{position:relative}
#inp{
  width:100%;padding:12px 16px;font-size:1rem;
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  color:var(--text);outline:none;transition:border-color .15s
}
#inp:focus{border-color:var(--accent)}
#inp::placeholder{color:var(--dim)}
#sug{
  display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  max-height:260px;overflow-y:auto;z-index:99
}
.sug-item{
  padding:10px 16px;cursor:pointer;font-size:.88rem;
  border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center
}
.sug-item:last-child{border-bottom:none}
.sug-item:hover,.sug-item.hi{background:var(--card-bg)}
.sug-item span{color:var(--dim);font-size:.78rem}

#out{max-width:1200px;margin:0 auto;padding:0 16px 48px}
.empty{text-align:center;color:var(--dim);padding:80px 20px;font-size:.95rem}
.spinner{text-align:center;color:var(--dim);padding:60px;font-size:.9rem}
.result-header{margin-bottom:20px}
.result-header h2{font-size:1.5rem;color:var(--gold);margin-bottom:4px}
.result-header p{color:var(--dim);font-size:.82rem}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}
.card{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  overflow:hidden;transition:transform .15s,border-color .15s;
  text-decoration:none;color:inherit;display:block
}
@media(hover:hover){.card:hover{transform:translateY(-4px);border-color:var(--accent)}}
.card img{width:100%;display:block}
.card .no-img{
  aspect-ratio:63/88;background:var(--card-bg);
  display:flex;align-items:center;justify-content:center;
  color:var(--dim);font-size:.72rem;text-align:center;padding:8px
}
.card .info{padding:8px 10px}
.card .cname{font-size:.78rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .cmeta{font-size:.68rem;color:var(--dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* hover zoom */
#zoom{
  display:none;position:fixed;z-index:1000;pointer-events:none;
  filter:drop-shadow(0 12px 40px rgba(0,0,0,.9));transition:opacity .1s
}
#zoom img{width:265px;border-radius:14px;display:block}
@media(hover:none){#zoom{display:none!important}}

/* mobile grid */
@media(max-width:600px){
  header h1{font-size:1.3rem}
  .grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .result-header h2{font-size:1.1rem}
}

/* ── Events ── */
#secEvents{max-width:760px;margin:0 auto;padding:0 16px 48px}
.ev-header{margin-bottom:20px}
.ev-header h2{font-size:1.4rem;color:var(--gold);margin-bottom:4px}
.ev-header p{color:var(--dim);font-size:.82rem}
.ev-group-label{
  font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;
  color:var(--dim);margin:20px 0 8px
}
.ev-card{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:14px 16px;margin-bottom:8px;
  display:flex;justify-content:space-between;align-items:flex-start;gap:12px
}
.ev-card.past{opacity:.4}
.ev-card h3{font-size:.92rem;margin-bottom:4px}
.ev-card h3 button{
  background:none;border:none;color:var(--accent);cursor:pointer;
  font-size:.92rem;font-weight:700;padding:0;text-decoration:underline dotted
}
.ev-card p{font-size:.78rem;color:var(--dim);margin:2px 0}
.ev-card a{color:var(--accent);font-size:.78rem}
.ev-date{
  font-size:.75rem;color:var(--gold);white-space:nowrap;flex-shrink:0;
  background:var(--card-bg);padding:4px 10px;border-radius:999px
}
.no-events{text-align:center;color:var(--dim);padding:60px 20px}
</style>
</head>
<body>

<div id="zoom"><img id="zoom-img" src="" alt=""></div>

<header>
  <h1>⚔ Pauper Artist Lookup</h1>
  <p>Find staples by artist · or artists by card</p>
</header>

<div class="top-nav">
  <button class="on" id="navS" onclick="showSection('search')">🔍 Search</button>
  <button id="navE" onclick="showSection('events')">📅 Events</button>
  <a class="admin-lnk" href="admin.html">⚙ Admin</a>
</div>

<!-- SEARCH -->
<div class="section on" id="secSearch">
  <div class="search-box">
    <div class="mode-tabs">
      <button class="on" id="bA" onclick="setMode('artist')">By Artist</button>
      <button id="bC" onclick="setMode('card')">By Card</button>
    </div>
    <div class="wrap">
      <input id="inp" type="text" placeholder="Type an artist name…" autocomplete="off">
      <div id="sug"></div>
    </div>
  </div>
  <div id="out"><div class="spinner">Loading database…</div></div>
</div>

<!-- EVENTS -->
<div class="section" id="secEvents">
  <div class="ev-header">
    <h2>Artist Events</h2>
    <p>Upcoming signing opportunities · managed from the <a href="admin.html" style="color:var(--accent)">admin panel</a></p>
  </div>
  <div id="evContent"></div>
</div>

<script>
// ── DB ────────────────────────────────────────────────────────────────────────
let DB=null, mode='artist', fidx=-1;
const inp=document.getElementById('inp'), sug=document.getElementById('sug'), out=document.getElementById('out');

fetch('data.json')
  .then(r=>{if(!r.ok)throw 0;return r.json()})
  .then(d=>{
    DB=d;
    const na=Object.keys(d.by_artist).length, nc=Object.keys(d.by_card).length;
    out.innerHTML=`<div class="empty">${na} artists · ${nc} cards loaded.<br>Start typing to search.</div>`;
  })
  .catch(()=>{out.innerHTML='<div class="empty">⚠ Could not load <code>data.json</code>.</div>'});

// ── Sections ──────────────────────────────────────────────────────────────────
function showSection(s){
  ['Search','Events'].forEach(x=>{
    document.getElementById('nav'+x[0]).classList.toggle('on',s===x.toLowerCase());
    document.getElementById('sec'+x).classList.toggle('on',s===x.toLowerCase());
  });
  if(s==='events') renderEvents();
}

// ── Events ────────────────────────────────────────────────────────────────────
function renderEvents(){
  const el=document.getElementById('evContent');
  const evs=JSON.parse(localStorage.getItem('pauper_events')||'[]');
  if(!evs.length){
    el.innerHTML='<div class="no-events">No events yet.<br>Add them from the <a href="admin.html" style="color:var(--accent)">admin panel</a>.</div>';
    return;
  }
  const today=new Date().toISOString().slice(0,10);
  const up=evs.filter(e=>e.date>=today).sort((a,b)=>a.date.localeCompare(b.date));
  const past=evs.filter(e=>e.date<today).sort((a,b)=>b.date.localeCompare(a.date));
  const row=(ev,cls='')=>{
    const d=new Date(ev.date+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
    return `<div class="ev-card ${cls}">
      <div>
        <h3><button onclick="searchArtist(${JSON.stringify(ev.artist)})">${ev.artist}</button></h3>
        <p>🎪 ${ev.eventName} · 📍 ${ev.location}</p>
        ${ev.website?`<a href="${ev.website}" target="_blank" rel="noopener">🔗 Website</a>`:''}
      </div>
      <div class="ev-date">${d}</div>
    </div>`;
  };
  let html='';
  if(up.length)   html+=`<div class="ev-group-label">Upcoming (${up.length})</div>`+up.map(e=>row(e)).join('');
  if(past.length) html+=`<div class="ev-group-label">Past (${past.length})</div>`+past.map(e=>row(e,'past')).join('');
  el.innerHTML=html;
}

function searchArtist(name){
  showSection('search');
  setMode('artist');
  inp.value=name;
  pick(name);
}

// ── Search ────────────────────────────────────────────────────────────────────
function setMode(m){
  mode=m;
  document.getElementById('bA').classList.toggle('on',m==='artist');
  document.getElementById('bC').classList.toggle('on',m==='card');
  inp.placeholder=m==='artist'?'Type an artist name…':'Type a card name…';
  inp.value=''; sug.style.display='none';
  out.innerHTML='<div class="empty">Start typing to search.</div>';
}
function ix(){return DB?(mode==='artist'?DB.by_artist:DB.by_card):{}}

inp.addEventListener('input',()=>{
  fidx=-1; const q=inp.value.trim();
  if(!q||!DB){sug.style.display='none';return}
  const lq=q.toLowerCase(), data=ix();
  const matches=Object.keys(data)
    .filter(k=>k.toLowerCase().includes(lq))
    .sort((a,b)=>a.toLowerCase().indexOf(lq)-b.toLowerCase().indexOf(lq))
    .slice(0,14);
  if(!matches.length){sug.style.display='none';return}
  sug.innerHTML=matches.map(m=>{
    const n=data[m].length;
    const label=mode==='artist'?`${new Set(data[m].map(x=>x.card_name)).size} cards`:`${n} printing${n!==1?'s':''}`;
    return `<div class="sug-item" data-name="${m.replace(/"/g,'&quot;')}">${m}<span>${label}</span></div>`;
  }).join('');
  sug.querySelectorAll('.sug-item').forEach(el=>el.addEventListener('click',()=>pick(el.dataset.name)));
  sug.style.display='block';
});

inp.addEventListener('keydown',e=>{
  const items=sug.querySelectorAll('.sug-item');
  if(!items.length)return;
  if(e.key==='ArrowDown'){fidx=Math.min(fidx+1,items.length-1);hl(items);e.preventDefault()}
  else if(e.key==='ArrowUp'){fidx=Math.max(fidx-1,0);hl(items);e.preventDefault()}
  else if(e.key==='Enter'&&fidx>=0){items[fidx]&&pick(items[fidx].dataset.name)}
  else if(e.key==='Escape')sug.style.display='none';
});
function hl(items){items.forEach((el,i)=>el.classList.toggle('hi',i===fidx))}
document.addEventListener('click',e=>{if(!e.target.closest('.wrap'))sug.style.display='none'});

function pick(name){inp.value=name;sug.style.display='none';render(name)}

function cardEl(name,p){
  const img=p.image
    ?`<img src="${p.image}" alt="${name}" loading="lazy" data-zoom="${p.image}">`
    :`<div class="no-img">${name}</div>`;
  const meta=mode==='artist'?p.set_name:`${p.artist} · ${p.set_name}`;
  return `<a class="card" href="${p.uri||'#'}" target="_blank" rel="noopener">${img}<div class="info"><div class="cname">${name}</div><div class="cmeta">${meta}</div></div></a>`;
}

function render(name){
  const data=ix(), rows=data[name];
  if(!rows){out.innerHTML='<div class="empty">No results found.</div>';return}
  if(mode==='artist'){
    const u=new Set(rows.map(r=>r.card_name)).size;
    out.innerHTML=`<div class="result-header"><h2>${name}</h2><p>${u} unique staple${u!==1?'s':''} · ${rows.length} artwork${rows.length!==1?'s':''}</p></div><div class="grid">${rows.map(r=>cardEl(r.card_name,r)).join('')}</div>`;
  } else {
    const a=new Set(rows.map(r=>r.artist)).size;
    out.innerHTML=`<div class="result-header"><h2>${name}</h2><p>${rows.length} artwork${rows.length!==1?'s':''} by ${a} artist${a!==1?'s':''}</p></div><div class="grid">${rows.map(r=>cardEl(name,r)).join('')}</div>`;
  }
}

// ── Hover zoom ────────────────────────────────────────────────────────────────
const zoom=document.getElementById('zoom'), zImg=document.getElementById('zoom-img');
out.addEventListener('mouseover',e=>{
  const t=e.target.closest('[data-zoom]');
  if(!t)return;
  zImg.src=t.dataset.zoom;
  zoom.style.display='block';
  const r=t.getBoundingClientRect(), w=265, m=12, h=w*(88/63);
  let left=r.right+m;
  if(left+w>window.innerWidth-m) left=r.left-w-m;
  let top=r.top;
  if(top+h>window.innerHeight-m) top=window.innerHeight-h-m;
  zoom.style.left=Math.max(m,left)+'px';
  zoom.style.top=Math.max(m,top)+'px';
});
out.addEventListener('mouseleave',()=>zoom.style.display='none');
</script>
</body>
</html>
