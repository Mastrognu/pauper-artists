<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pauper Artist Lookup</title>
<style>
:root {
  --bg: #12121f; --surface: #1c1c30; --card-bg: #252540;
  --accent: #e05555; --gold: #c8a84b;
  --text: #e8e8f0; --dim: #7878a0; --border: #2e2e50;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
header { text-align: center; padding: 36px 20px 28px; }
header h1 { font-size: 1.8rem; color: var(--gold); letter-spacing: .06em; margin-bottom: 6px; }
header p  { color: var(--dim); font-size: .85rem; }

.search-box { max-width: 560px; margin: 0 auto 36px; padding: 0 16px; }
.tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 12px; }
.tabs button {
  padding: 5px 20px; border-radius: 999px; border: 1px solid var(--border);
  background: transparent; color: var(--dim); cursor: pointer; font-size: .85rem; transition: all .15s;
}
.tabs button.on { background: var(--accent); border-color: var(--accent); color: #fff; }
.wrap { position: relative; }
#inp {
  width: 100%; padding: 12px 16px; font-size: 1rem;
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); outline: none; transition: border-color .15s;
}
#inp:focus { border-color: var(--accent); }
#inp::placeholder { color: var(--dim); }
#sug {
  display: none; position: absolute; top: calc(100% + 4px); left: 0; right: 0;
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  max-height: 260px; overflow-y: auto; z-index: 99;
}
.sug-item {
  padding: 10px 16px; cursor: pointer; font-size: .88rem;
  border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;
}
.sug-item:last-child { border-bottom: none; }
.sug-item:hover, .sug-item.hi { background: var(--card-bg); }
.sug-item span { color: var(--dim); font-size: .78rem; }

#out { max-width: 1200px; margin: 0 auto; padding: 0 16px 48px; }
.empty { text-align: center; color: var(--dim); padding: 80px 20px; font-size: .95rem; }

.result-header { margin-bottom: 20px; }
.result-header h2 { font-size: 1.5rem; color: var(--gold); margin-bottom: 4px; }
.result-header p  { color: var(--dim); font-size: .82rem; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 14px;
}
.card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  overflow: hidden; transition: transform .15s, border-color .15s;
  text-decoration: none; color: inherit; display: block;
}
.card:hover { transform: translateY(-4px); border-color: var(--accent); }
.card img { width: 100%; display: block; }
.card .no-img {
  aspect-ratio: 63/88; background: var(--card-bg);
  display: flex; align-items: center; justify-content: center;
  color: var(--dim); font-size: .72rem; text-align: center; padding: 8px;
}
.card .info { padding: 8px 10px; }
.card .cname { font-size: .78rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card .cmeta { font-size: .68rem; color: var(--dim); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.spinner { text-align: center; color: var(--dim); padding: 60px; font-size: .9rem; }
</style>
</head>
<body>

<header>
  <h1>⚔ Pauper Artist Lookup</h1>
  <p>Find staples by artist · or artists by card</p>
</header>

<div class="search-box">
  <div class="tabs">
    <button class="on" id="bA" onclick="setMode('artist')">By Artist</button>
    <button id="bC" onclick="setMode('card')">By Card</button>
  </div>
  <div class="wrap">
    <input id="inp" type="text" placeholder="Type an artist name…" autocomplete="off">
    <div id="sug"></div>
  </div>
</div>

<div id="out"><div class="spinner">Loading database…</div></div>

<script>
let DB = null, mode = 'artist', fidx = -1;
const inp = document.getElementById('inp');
const sug = document.getElementById('sug');
const out = document.getElementById('out');

fetch('data.json')
  .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
  .then(d => {
    DB = d;
    const na = Object.keys(d.by_artist).length;
    const nc = Object.keys(d.by_card).length;
    out.innerHTML = `<div class="empty">${na} artists · ${nc} cards loaded.<br>Start typing to search.</div>`;
  })
  .catch(() => {
    out.innerHTML = `<div class="empty">⚠ Could not load <code>data.json</code>.<br>Make sure it sits in the same folder as this file.</div>`;
  });

function setMode(m) {
  mode = m;
  document.getElementById('bA').classList.toggle('on', m === 'artist');
  document.getElementById('bC').classList.toggle('on', m === 'card');
  inp.placeholder = m === 'artist' ? 'Type an artist name…' : 'Type a card name…';
  inp.value = '';
  sug.style.display = 'none';
  out.innerHTML = '<div class="empty">Start typing to search.</div>';
}

function idx() { return DB ? (mode === 'artist' ? DB.by_artist : DB.by_card) : {}; }

function suggest(q) {
  const lq = q.toLowerCase();
  return Object.keys(idx())
    .filter(k => k.toLowerCase().includes(lq))
    .sort((a, b) => a.toLowerCase().indexOf(lq) - b.toLowerCase().indexOf(lq))
    .slice(0, 14);
}

inp.addEventListener('input', () => {
  fidx = -1;
  const q = inp.value.trim();
  if (!q || !DB) { sug.style.display = 'none'; return; }
  const matches = suggest(q);
  if (!matches.length) { sug.style.display = 'none'; return; }
  const ix = idx();
  sug.innerHTML = matches.map(m => {
    const n = ix[m].length;
    const label = mode === 'artist'
      ? `${new Set(ix[m].map(x => x.card_name)).size} cards`
      : `${n} printing${n !== 1 ? 's' : ''}`;
    return `<div class="sug-item" data-name="${m.replace(/"/g, '&quot;')}">${m}<span>${label}</span></div>`;
  }).join('');
  sug.querySelectorAll('.sug-item').forEach(el =>
    el.addEventListener('click', () => pick(el.dataset.name))
  );
  sug.style.display = 'block';
});

inp.addEventListener('keydown', e => {
  const items = sug.querySelectorAll('.sug-item');
  if (!items.length) return;
  if (e.key === 'ArrowDown') { fidx = Math.min(fidx+1, items.length-1); highlight(items); e.preventDefault(); }
  else if (e.key === 'ArrowUp') { fidx = Math.max(fidx-1, 0); highlight(items); e.preventDefault(); }
  else if (e.key === 'Enter' && fidx >= 0) { const items = sug.querySelectorAll('.sug-item'); items[fidx] && pick(items[fidx].dataset.name); }
  else if (e.key === 'Escape') sug.style.display = 'none';
});
function highlight(items) { items.forEach((el,i) => el.classList.toggle('hi', i === fidx)); }
document.addEventListener('click', e => { if (!e.target.closest('.wrap')) sug.style.display = 'none'; });

function pick(name) {
  inp.value = name;
  sug.style.display = 'none';
  render(name);
}

function cardEl(name, p) {
  const img = p.image
    ? `<img src="${p.image}" alt="${name}" loading="lazy">`
    : `<div class="no-img">${name}</div>`;
  const meta = mode === 'artist'
    ? p.set_name
    : `${p.artist} · ${p.set_name}`;
  return `<a class="card" href="${p.uri || '#'}" target="_blank" rel="noopener">
    ${img}
    <div class="info">
      <div class="cname">${name}</div>
      <div class="cmeta">${meta}</div>
    </div>
  </a>`;
}

function render(name) {
  const ix = idx();
  const rows = ix[name];
  if (!rows) { out.innerHTML = '<div class="empty">No results found.</div>'; return; }

  if (mode === 'artist') {
    const uniqueCards = new Set(rows.map(r => r.card_name)).size;
    out.innerHTML = `
      <div class="result-header">
        <h2>${name}</h2>
        <p>${uniqueCards} unique staple${uniqueCards !== 1 ? 's' : ''} · ${rows.length} total printing${rows.length !== 1 ? 's' : ''}</p>
      </div>
      <div class="grid">${rows.map(r => cardEl(r.card_name, r)).join('')}</div>`;
  } else {
    const artists = new Set(rows.map(r => r.artist)).size;
    out.innerHTML = `
      <div class="result-header">
        <h2>${name}</h2>
        <p>${rows.length} printing${rows.length !== 1 ? 's' : ''} by ${artists} artist${artists !== 1 ? 's' : ''}</p>
      </div>
      <div class="grid">${rows.map(r => cardEl(name, r)).join('')}</div>`;
  }
}
</script>
</body>
</html>
