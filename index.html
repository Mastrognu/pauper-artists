<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pauper Artist Lookup</title>
<link rel="icon" type="image/png" href="icon.png">
<style>
:root{
  --bg:#090912;--bg2:#0d0d18;
  --surf:#111120;--surf2:#181828;--surf3:#1e1e32;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --accent:#d94f6e;--accent-glow:rgba(217,79,110,.15);
  --gold:#c9a84c;--gold-glow:rgba(201,168,76,.15);
  --text:#eeeef6;--text2:#8888aa;--text3:#3e3e58;
  --r:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}

/* ── Header ── */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 24px;border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:40;
  background:rgba(9,9,18,.8);backdrop-filter:blur(16px);
}
.logo{display:flex;align-items:center;gap:9px;text-decoration:none}
.logo-mark{
  width:30px;height:30px;border-radius:8px;
  background:linear-gradient(135deg,var(--accent),#8b2fd4);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
}
.logo-mark img{width:22px;height:22px;object-fit:contain;filter:invert(1) brightness(1.2);}
.logo-text{font-size:.8rem;font-weight:700;letter-spacing:.14em;color:var(--text);text-transform:uppercase}
.header-right{display:flex;align-items:center;gap:8px}
.btn-events{
  display:flex;align-items:center;gap:7px;
  padding:7px 13px;background:var(--surf2);border:1px solid var(--border2);
  border-radius:8px;color:var(--text2);font-size:.8rem;cursor:pointer;transition:all .15s;
}
.btn-events:hover{background:var(--surf3);color:var(--text)}
.ev-badge{
  background:var(--accent);color:#fff;font-size:.62rem;font-weight:700;
  padding:1px 6px;border-radius:99px;display:none;
}
.btn-admin{
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  background:var(--surf2);border:1px solid var(--border);border-radius:8px;
  color:var(--text3);font-size:.85rem;text-decoration:none;transition:all .15s;
}
.btn-admin:hover{color:var(--text2);border-color:var(--border2)}

/* ── Hero ── */
.hero{
  display:flex;flex-direction:column;align-items:center;
  padding:64px 20px 48px;
}
.hero h1{
  font-size:2.6rem;font-weight:700;letter-spacing:-.025em;
  text-align:center;margin-bottom:10px;
  background:linear-gradient(160deg,var(--text) 50%,var(--text2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero p{color:var(--text3);font-size:.87rem;margin-bottom:36px;text-align:center}

/* ── Search ── */
.search-wrap{width:100%;max-width:600px;position:relative}
.search-field{
  display:flex;align-items:center;gap:10px;
  background:var(--surf);border:1px solid var(--border2);
  border-radius:14px;padding:5px 5px 5px 16px;
  transition:border-color .2s,box-shadow .2s;
}
.search-field:focus-within{
  border-color:rgba(217,79,110,.45);
  box-shadow:0 0 0 3px var(--accent-glow);
}
.search-field svg{color:var(--text3);flex-shrink:0}
#inp{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--text);font-size:.95rem;padding:9px 0;
}
#inp::placeholder{color:var(--text3)}
.mode-pills{
  display:flex;background:var(--surf2);border-radius:9px;padding:3px;gap:2px;flex-shrink:0;
}
.mode-pills button{
  padding:6px 13px;border-radius:7px;border:none;
  background:transparent;color:var(--text2);font-size:.76rem;font-weight:500;
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.mode-pills button.on{background:var(--accent);color:#fff}

/* ── Suggestions ── */
#sug{
  display:none;position:absolute;top:calc(100% + 6px);left:0;right:0;
  background:var(--surf);border:1px solid var(--border2);border-radius:12px;
  overflow:hidden;z-index:99;box-shadow:0 20px 60px rgba(0,0,0,.6);
}
.sug-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:11px 16px;cursor:pointer;font-size:.88rem;
  border-bottom:1px solid var(--border);transition:background .1s;
}
.sug-item:last-child{border-bottom:none}
.sug-item:hover,.sug-item.hi{background:var(--surf2)}
.sug-badge{
  font-size:.72rem;color:var(--text3);
  background:var(--surf2);padding:2px 9px;border-radius:99px;
}
.sug-item.hi .sug-badge{background:var(--surf3)}

/* ── Results ── */
#results{max-width:1300px;margin:0 auto;padding:0 20px 80px}
.result-header{
  display:flex;align-items:baseline;gap:14px;
  margin-bottom:24px;padding-bottom:16px;
  border-bottom:1px solid var(--border);
}
.result-header h2{font-size:1.6rem;font-weight:700;color:var(--gold)}
.result-header span{font-size:.78rem;color:var(--text3)}
.empty-state{text-align:center;padding:100px 20px;color:var(--text3)}
.empty-state .icon{font-size:2.5rem;opacity:.2;margin-bottom:14px}

/* ── Grid ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:14px}
@media(max-width:600px){
  .grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .hero{padding:36px 16px 28px}
  .hero h1{font-size:1.7rem}
  header{padding:12px 16px}
}
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.card{
  position:relative;border-radius:10px;overflow:hidden;
  text-decoration:none;color:inherit;display:block;
  background:var(--surf);border:1px solid var(--border);
  transition:transform .2s,border-color .2s,box-shadow .2s;
  animation:up .3s ease both;
}
.card:hover{
  transform:translateY(-6px) scale(1.015);
  border-color:rgba(255,255,255,.18);
  box-shadow:0 16px 48px rgba(0,0,0,.55);
}
.card img{width:100%;display:block}
.card .no-img{
  aspect-ratio:63/88;background:var(--surf2);
  display:flex;align-items:center;justify-content:center;
  color:var(--text3);font-size:.72rem;text-align:center;padding:12px;
}
.card-overlay{
  position:absolute;bottom:0;left:0;right:0;
  padding:32px 10px 10px;
  background:linear-gradient(to top,rgba(4,4,14,.97) 0%,transparent 100%);
}
.artist-link{
  background:none;border:none;padding:0;
  color:var(--gold);cursor:pointer;font-size:.63rem;font-family:inherit;
  text-decoration:underline dotted;transition:opacity .15s;
}
.artist-link:hover{opacity:.7}

/* ── Zoom ── */
#zoom{display:none;position:fixed;z-index:1000;pointer-events:none;filter:drop-shadow(0 20px 60px rgba(0,0,0,.95))}
#zoom img{width:280px;border-radius:16px;display:block}

/* ── Drawer ── */
#drawer-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.55);z-index:60;backdrop-filter:blur(3px);
}
#drawer-overlay.on{display:block}
#drawer{
  position:fixed;top:0;right:0;bottom:0;width:380px;max-width:100vw;
  background:var(--bg2);border-left:1px solid var(--border2);
  z-index:61;display:flex;flex-direction:column;overflow:hidden;
  transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
}
#drawer.on{transform:translateX(0)}
.drawer-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 18px 14px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.drawer-header h2{font-size:.95rem;font-weight:600}
.drawer-close{
  width:28px;height:28px;display:flex;align-items:center;justify-content:center;
  background:var(--surf2);border:1px solid var(--border);border-radius:7px;
  color:var(--text2);font-size:.8rem;cursor:pointer;transition:all .15s;
}
.drawer-close:hover{color:var(--text);border-color:var(--border2)}
#drawer-content{flex:1;overflow-y:auto;padding:14px}
.ev-group{font-size:.67rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin:12px 0 8px 2px}
.ev-item{
  background:var(--surf);border:1px solid var(--border);border-radius:10px;
  padding:12px 14px;margin-bottom:8px;transition:border-color .15s;
}
.ev-item:hover{border-color:var(--border2)}
.ev-item.past{opacity:.35}
.ev-date{
  display:inline-block;font-size:.67rem;font-weight:500;
  color:var(--gold);background:var(--gold-glow);
  border:1px solid rgba(201,168,76,.2);padding:2px 8px;
  border-radius:99px;margin-bottom:6px;
}
.ev-artist{
  font-size:.88rem;font-weight:600;color:var(--gold);
  background:none;border:none;padding:0;cursor:pointer;
  text-align:left;display:block;margin-bottom:3px;
  transition:opacity .15s;
}
.ev-artist:hover{opacity:.75}
.ev-name{font-size:.78rem;color:var(--text);margin-bottom:3px}
.ev-loc{font-size:.72rem;color:var(--text2);margin-bottom:4px}
.ev-link{font-size:.72rem;color:var(--accent);text-decoration:none}
.ev-link:hover{text-decoration:underline}
.drawer-empty{text-align:center;color:var(--text3);padding:48px 16px;font-size:.84rem;line-height:1.8}
.drawer-empty a{color:var(--accent)}
</style>
</head>
<body>

<div id="zoom"><img id="zoom-img" src="" alt=""></div>
<div id="drawer-overlay" onclick="closeDrawer()"></div>
<div id="drawer">
  <div class="drawer-header">
    <h2>Artist Events</h2>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div id="drawer-content"></div>
</div>

<header>
  <a class="logo" href="#">
    <div class="logo-mark"><img src="icon.png" alt="Pauper"></div>
    <span class="logo-text">Pauper Artist Lookup</span>
  </a>
  <div class="header-right">
    <button class="btn-events" onclick="openDrawer()">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><rect x="1" y="3" width="14" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M5 1v4M11 1v4M1 7h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Events
      <span class="ev-badge" id="evBadge"></span>
    </button>
    <a class="btn-admin" href="admin.html" title="Admin panel">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.4"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
    </a>
  </div>
</header>

<div class="hero">
  <h1>Pauper Artist Lookup</h1>
  <p>Find every Pauper staple by artist · or every artist by card</p>
  <div class="search-wrap">
    <div class="search-field">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5"/><path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <input id="inp" type="text" placeholder="Search artists…" autocomplete="off" spellcheck="false">
      <div class="mode-pills">
        <button class="on" id="bA" onclick="setMode('artist')">Artist</button>
        <button id="bC" onclick="setMode('card')">Card</button>
      </div>
    </div>
    <div id="sug"></div>
  </div>
</div>

<div id="results">
  <div class="empty-state"><div class="icon">⚔</div><p>Search for an artist or card above</p></div>
</div>

<script>
let DB=null,mode='artist',fidx=-1;
const inp=document.getElementById('inp'),sug=document.getElementById('sug'),res=document.getElementById('results');

fetch('data.json')
  .then(r=>{if(!r.ok)throw 0;return r.json()})
  .then(d=>{DB=d;updateBadge()})
  .catch(()=>{res.innerHTML='<div class="empty-state"><p>⚠ Could not load data.json</p></div>'});

function setMode(m){
  mode=m;
  document.getElementById('bA').classList.toggle('on',m==='artist');
  document.getElementById('bC').classList.toggle('on',m==='card');
  inp.placeholder=m==='artist'?'Search artists…':'Search cards…';
  inp.value='';sug.style.display='none';
  res.innerHTML=`<div class="empty-state"><div class="icon">⚔</div><p>Search for a${m==='artist'?'n artist':' card'} above</p></div>`;
  inp.focus();
}
function ix(){return DB?(mode==='artist'?DB.by_artist:DB.by_card):{}}

inp.addEventListener('input',()=>{
  fidx=-1;const q=inp.value.trim();
  if(!q||!DB){sug.style.display='none';return}
  const lq=q.toLowerCase(),data=ix();
  const ms=Object.keys(data)
    .filter(k=>k.toLowerCase().includes(lq))
    .sort((a,b)=>a.toLowerCase().indexOf(lq)-b.toLowerCase().indexOf(lq))
    .slice(0,12);
  if(!ms.length){sug.style.display='none';return}
  sug.innerHTML=ms.map(m=>{
    const n=data[m].length;
    const cnt=mode==='artist'?`${new Set(data[m].map(x=>x.card_name)).size} cards`:`${n} printings`;
    return `<div class="sug-item" data-name="${m.replace(/"/g,'&quot;')}"><span>${m}</span><span class="sug-badge">${cnt}</span></div>`;
  }).join('');
  sug.querySelectorAll('.sug-item').forEach(el=>el.addEventListener('click',()=>pick(el.dataset.name)));
  sug.style.display='block';
});

inp.addEventListener('keydown',e=>{
  const items=sug.querySelectorAll('.sug-item');if(!items.length)return;
  if(e.key==='ArrowDown'){fidx=Math.min(fidx+1,items.length-1);hl(items);e.preventDefault()}
  else if(e.key==='ArrowUp'){fidx=Math.max(fidx-1,0);hl(items);e.preventDefault()}
  else if(e.key==='Enter'&&fidx>=0){items[fidx]&&pick(items[fidx].dataset.name)}
  else if(e.key==='Escape')sug.style.display='none';
});
function hl(its){its.forEach((el,i)=>el.classList.toggle('hi',i===fidx))}
document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))sug.style.display='none'});

function pick(name){inp.value=name;sug.style.display='none';render(name)}

function searchArtist(name){setMode('artist');inp.value=name;pick(name)}

function cardEl(name,p,i){
  const img=p.image?`<img src="${p.image}" alt="${name}" loading="lazy">`:`<div class="no-img">${name}</div>`;
  const meta=mode==='artist'
    ?`<span>${p.set_name}</span>`
    :`<button class="artist-link" onclick="event.preventDefault();event.stopPropagation();searchArtist(${JSON.stringify(p.artist)})">${p.artist}</button><span style="color:var(--text3)"> · ${p.set_name}</span>`;
  return `<a class="card" href="${p.uri||'#'}" target="_blank" rel="noopener" style="animation-delay:${Math.min(i*18,320)}ms">
    ${img}
    <div class="card-overlay">
      <div class="card-name">${name}</div>
      <div class="card-meta">${meta}</div>
    </div>
  </a>`;
}

function render(name){
  const data=ix(),rows=data[name];
  if(!rows){res.innerHTML=`<div class="empty-state"><p>No results for "${name}"</p></div>`;return}
  const hdr=mode==='artist'
    ?`<h2>${name}</h2><span>${new Set(rows.map(r=>r.card_name)).size} staples · ${rows.length} artworks</span>`
    :`<h2>${name}</h2><span>${rows.length} artworks · ${new Set(rows.map(r=>r.artist)).size} artists</span>`;
  res.innerHTML=`<div class="result-header">${hdr}</div><div class="grid">${rows.map((r,i)=>cardEl(mode==='artist'?r.card_name:name,r,i)).join('')}</div>`;
  attachZoom();
}

// Zoom
const zoom=document.getElementById('zoom'),zImg=document.getElementById('zoom-img');
function attachZoom(){
  document.querySelectorAll('.card img').forEach(img=>{
    img.addEventListener('mouseenter',()=>{
      zImg.src=img.src;zoom.style.display='block';
      const r=img.getBoundingClientRect(),w=280,m=14,h=w*(88/63);
      let l=r.right+m; if(l+w>window.innerWidth-m) l=r.left-w-m;
      let t=r.top;     if(t+h>window.innerHeight-m) t=window.innerHeight-h-m;
      zoom.style.left=Math.max(m,l)+'px';zoom.style.top=Math.max(m,t)+'px';
    });
    img.addEventListener('mouseleave',()=>zoom.style.display='none');
  });
}

// Drawer
function openDrawer(){
  renderDrawer();
  document.getElementById('drawer').classList.add('on');
  document.getElementById('drawer-overlay').classList.add('on');
}
function closeDrawer(){
  document.getElementById('drawer').classList.remove('on');
  document.getElementById('drawer-overlay').classList.remove('on');
}
function renderDrawer(){
  const el=document.getElementById('drawer-content');
  const evs=JSON.parse(localStorage.getItem('pauper_events')||'[]');
  if(!evs.length){
    el.innerHTML='<div class="drawer-empty">No events yet.<br>Add them from the <a href="admin.html">admin panel</a>.</div>';
    return;
  }
  const today=new Date().toISOString().slice(0,10);
  const up=evs.filter(e=>e.date>=today).sort((a,b)=>a.date.localeCompare(b.date));
  const past=evs.filter(e=>e.date<today).sort((a,b)=>b.date.localeCompare(a.date));
  const row=(ev,cls='')=>{
    const d=new Date(ev.date+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
    const artists=ev.artists||(ev.artist?[ev.artist]:[]);
    const artistBtns=artists.map(a=>`<button class="ev-artist" onclick="searchFromDrawer(${JSON.stringify(a)})">${a}</button>`).join('');
    return `<div class="ev-item ${cls}">
      <div class="ev-date">${d}</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px">${artistBtns}</div>
      <div class="ev-name">${ev.eventName}</div>
      <div class="ev-loc">📍 ${ev.location}</div>
      ${ev.website?`<a class="ev-link" href="${ev.website}" target="_blank" rel="noopener">🔗 Website</a>`:''}
    </div>`;
  };
  let html='';
  if(up.length)   html+=`<div class="ev-group">Upcoming · ${up.length}</div>`+up.map(e=>row(e)).join('');
  if(past.length) html+=`<div class="ev-group">Past · ${past.length}</div>`+past.map(e=>row(e,'past')).join('');
  el.innerHTML=html;
}
function searchFromDrawer(artist){closeDrawer();setMode('artist');inp.value=artist;pick(artist)}
function updateBadge(){
  const evs=JSON.parse(localStorage.getItem('pauper_events')||'[]');
  const n=evs.filter(e=>e.date>=new Date().toISOString().slice(0,10)).length;
  const b=document.getElementById('evBadge');
  b.style.display=n?'inline':'none';b.textContent=n;
}
</script>
</body>
</html>
